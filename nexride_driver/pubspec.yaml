name: nexride_driver
description: NexRide Driver App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  audioplayers: ^5.2.1  
  url_launcher: ^6.2.5

  cupertino_icons: ^1.0.8

  # Maps
  google_maps_flutter: ^2.5.0

  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.0

  # Firebase (keep in sync; avoids web ^0.5 vs ^1 conflicts with file_picker 8.x)
  firebase_core: ^3.8.1
  firebase_auth: ^5.5.1
  firebase_database: ^11.3.0
  firebase_storage: ^12.4.0
  cloud_functions: ^5.6.1
  firebase_messaging: ^15.2.0

  # HTTP (Google Directions API)
  http: ^1.2.1
  agora_rtc_engine: 6.5.3
  permission_handler: ^11.4.0
  image_picker: ^1.1.2
  file_picker: ^8.1.7

  # Polyline
  flutter_polyline_points: ^2.1.0

  # Animations
  lottie: ^2.1.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/nexride_app_icon.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/branding/nexride_app_icon.png

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/car.png
    - assets/animations/
    - assets/sounds/ride_request.mp3
    - assets/branding/nexride_app_icon.png
