name: nexride_merchant
description: NexRide dedicated merchant app (stores, restaurants, marts).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  firebase_core: ^3.8.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.0
  cloud_functions: ^5.6.1
  firebase_messaging: ^15.1.6
  firebase_storage: ^12.4.0
  flutter_local_notifications: ^18.0.1
  connectivity_plus: ^6.1.1
  flutter_image_compress: ^2.3.0
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  app_links: ^6.4.1
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
