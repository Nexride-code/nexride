<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="NexRide Africa — ride hailing, taxi booking, and dispatch platform for Nigeria. Rider app, driver app, secure payments, and live trip sharing." />
  <meta name="keywords" content="NexRide, NexRide Africa, ride hailing Africa, taxi booking, dispatch platform, driver app, rider app, Lagos, Abuja" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta property="og:title" content="NexRide Africa" />
  <meta property="og:description" content="Professional ride hailing and dispatch — rider app, driver app, live tracking." />
  <meta property="og:url" content="https://nexride.africa/" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>NexRide Africa</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icons/Icon-192.png" />
  <base href="$FLUTTER_BASE_HREF" />
  <style>
    body { margin: 0; background: #0f0f0f; }
    .nx-boot {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #f4f4f5;
    }
    .nx-spinner {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 3px solid rgba(201, 162, 39, 0.25);
      border-top-color: #c9a227;
      animation: nx-rot 0.9s linear infinite;
    }
    @keyframes nx-rot { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="nx-boot" id="nx-boot">
    <div class="nx-spinner"></div>
    <div>Loading NexRide…</div>
  </div>
  <script>
    window.addEventListener("flutter-first-frame", function () {
      var el = document.getElementById("nx-boot");
      if (el) el.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
