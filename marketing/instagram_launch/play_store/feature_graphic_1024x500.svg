  <rect x="720" y="160" width="220" height="220" rx="36" fill="#141210" stroke="#D4AF37" stroke-width="4" opacity="0.9"/>
  <text x="830" y="288" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="#666">App</text>
  <text x="830" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" fill="#D4AF37" font-weight="600">GET IT</text>
