    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8D48A"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#A67C00"/>
    </linearGradient>
  </defs>
  <g transform="translate(540,540)">
    <!-- Road curve motif -->
    <path d="M -320 -120 Q -80 -280 120 -180 T 380 40" fill="none" stroke="url(#gold)" stroke-width="28" stroke-linecap="round" opacity="0.35"/>
    <!-- Monogram N -->
    <path d="M -200 -220 L -200 220 M -200 -220 L 200 220 M 200 -220 L 200 220" fill="none" stroke="url(#gold)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
