name: nexride
description: NexRide ride hailing platform
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  intl: ^0.18.1
  cupertino_icons: ^1.0.6

  # FIREBASE
  firebase_core: ^2.32.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.17.5
  firebase_database: ^10.4.5
  cloud_functions: ^4.7.6
  firebase_storage: ^11.7.7
  firebase_messaging: ^14.9.4
  firebase_analytics: ^10.10.7

  # MAPS
  google_maps_flutter: ^2.6.0
  geolocator: ^10.1.0
  flutter_polyline_points: ^2.1.0

  # NETWORK
  http: ^1.1.0
  url_launcher: ^6.3.1
  agora_rtc_engine: ^6.5.3
  permission_handler: ^11.4.0
  image_picker: ^1.1.2
  shared_preferences: ^2.2.3
  app_links: ^6.4.0

  # SHARE TRIP FEATURE
  share_plus: ^7.2.1

  # ANIMATION
  lottie: ^2.7.0
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

dependency_overrides:
  agora_rtc_engine:
    path: third_party/agora_rtc_engine

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/nexride_app_icon.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/branding/nexride_app_icon.png

flutter:

  uses-material-design: true

  assets:
  - assets/car.png
  - assets/animations/
  - assets/branding/nexride_app_icon.png
